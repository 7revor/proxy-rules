port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

proxy-providers:
  subscription:
    type: http
    url: "URL"
    interval: 86400
    path: ./proxies/subscription.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: "🚀 科学上网"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇺🇲 美国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "⚙️ 手动选择"

  - name: "🔒 隐私服务"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇺🇲 美国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "⚙️ 手动选择"

  - name: "⚠️ 风控服务"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇺🇲 美国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "⚙️ 手动选择"

  - name: "🖥️ 微软服务"
    type: select
    proxies:
      - DIRECT
      - "🚀 科学上网"
      - "🔒 隐私服务"

  - name: "🎬 海外媒体"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇺🇲 美国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "⚙️ 手动选择"

  - name: "🛡️ 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🎯 国内网络"
    type: select
    proxies:
      - DIRECT
      - "🚀 科学上网"

  - name: "🐟 其他网站"
    type: select
    proxies:
      - "🚀 科学上网"
      - DIRECT

  - name: "🇭🇰 香港节点"
    type: select
    use:
      - subscription
    filter: "(?i)港|HK|Hong Kong"

  - name: "🇺🇲 美国节点"
    type: select
    use:
      - subscription
    filter: "(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States"

  - name: "🇯🇵 日本节点"
    type: select
    use:
      - subscription
    filter: "(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan"

  - name: "🇸🇬 新加坡节点"
    type: select
    use:
      - subscription
    filter: "(?i)新加坡|SG|Singapore"

  - name: "⚙️ 手动选择"
    type: select
    use:
      - subscription

