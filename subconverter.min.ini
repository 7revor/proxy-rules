[custom]
# 本地网络
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Lan/Lan.list

# 去广告
; surge_ruleset=🛡️ 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
; surge_ruleset=🛡️ 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
surge_ruleset=🛡️ 广告拦截,https://raw.githubusercontent.com/7revor/proxy-rules/main/block.list

# 代理
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/7revor/proxy-rules/main/privacy.list
# 直连
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Direct/Direct.list

# steam 登录地址（直连登录后下载会分配国内cdn地址）
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/SteamCN/SteamCN.list
# psn 直连
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PlayStation/PlayStation.list
# game download
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Game/GameDownloadCN/GameDownloadCN.list

# paypal
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PayPal/PayPal.list
# Gemini
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Gemini/Gemini.list
# claude
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Claude/Claude.list
# openai
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list
# 补充
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/7revor/proxy-rules/main/ai.list

# telegram
surge_ruleset=🚀 科学上网,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list

# tmdb（NAS）
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Tmdb/Tmdb.list
# docker（NAS）
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Docker/Docker.list
# github
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/GitHub/GitHub.list

# media
surge_ruleset=🎬 海外媒体,https://raw.githubusercontent.com/7revor/proxy-rules/main/media.list
surge_ruleset=🎬 海外媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list
surge_ruleset=🎬 海外媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list

# Oracle
surge_ruleset=🔑 隐私服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Oracle/Oracle.list
# Microsoft
surge_ruleset=🖥️ 微软服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list
# GFW
surge_ruleset=🚀 科学上网,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Proxy/Proxy_All_No_Resolve.list
# China
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/China/China_All_No_Resolve.list
# geo ip（resolve）
surge_ruleset=🎯 国内网络,[]GEOIP,CN
# mjj
surge_ruleset=🎯 国内网络,https://raw.githubusercontent.com/7revor/proxy-rules/main/direct_ip.list
# TEMPLATE
{% if request.target == "clash" %}
surge_ruleset=🎯 国内网络,[]DST-PORT,22
{% endif %}

# final
surge_ruleset=🐟 其他网站,[]FINAL

# 节点选择
{% set PROXY_SUFFIX = "`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]⚙️ 手动选择" %}

# 分组
custom_proxy_group=🚀 科学上网`select{{ PROXY_SUFFIX }}
custom_proxy_group=🔑 隐私服务`select{{ PROXY_SUFFIX }}
custom_proxy_group=🖥️ 微软服务`select`[]DIRECT`[]🚀 科学上网`[]🔑 隐私服务
custom_proxy_group=🎬 海外媒体`select{{ PROXY_SUFFIX }}
custom_proxy_group=🛡️ 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🎯 国内网络`select`[]DIRECT`[]🚀 科学上网
custom_proxy_group=🐟 其他网站`select`[]🚀 科学上网`[]DIRECT

# 地区分组
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|Hong Kong)
custom_proxy_group=🇺🇲 美国节点`select`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
custom_proxy_group=🇯🇵 日本节点`select`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)
custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore)
custom_proxy_group=⚙️ 手动选择`select`(.*)

enable_rule_generator=true
overwrite_original_rules=true
